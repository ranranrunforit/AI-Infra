# priority_rules.yaml — v4 Robot Anomaly Detection Rules
# Per-rule capture windows (v2 — more precise than flat ±5s from report)
# Layer 1 of 3-layer detection: deterministic, zero-latency evaluation

rules:
  # ── P0 Critical ────────────────────────────────────────────────────────────
  - id: battery_critical
    description: "Battery below 15% — robot at risk of power loss mid-operation"
    trigger: "telemetry.battery_pct < 15"
    promote_to: p0
    capture_pre_sec: 30   # 30s reach-back: see full discharge curve
    capture_post_sec: 0   # No post: power may be lost

  - id: motor_overcurrent
    description: "Motor current 150% above threshold — winding fault or mechanical jam"
    trigger: "telemetry.motor_current_A > 15"   # threshold * 1.5 = 10A * 1.5
    promote_to: p0
    capture_pre_sec: 10   # 10s pre: see lead-up to fault
    capture_post_sec: 5   # 5s post: capture fault aftermath

  - id: collision_imu
    description: "High-G impact or very close obstacle — collision event"
    trigger: "telemetry.linear_accel_mps2 > 8"
    promote_to: p0
    capture_pre_sec: 5    # 5s pre: approach path
    capture_post_sec: 10  # 10s post: post-collision behavior

  - id: lidar_near_obstacle
    description: "LiDAR obstacle distance below 10cm — near miss or collision"
    trigger: "telemetry.obstacle_dist_m < 0.1"
    promote_to: p0
    capture_pre_sec: 5
    capture_post_sec: 5

  - id: fatal_log
    description: "ROS2 node emitted FATAL or ERROR log — software fault"
    trigger: "telemetry.has_fatal_log"
    promote_to: p0
    capture_pre_sec: 0    # Grab from current file onward
    capture_post_sec: 30  # 30s post: capture recovery attempt or crash loop

  - id: unexpected_restart
    description: "Process watchdog detected unexpected restart"
    trigger: "telemetry.restart_count > 0"
    promote_to: p0
    capture_pre_sec: 60   # Long pre-window: may have crashed just before
    capture_post_sec: 30

  - id: high_motor_temp
    description: "Motor temperature > 80°C — thermal shutdown imminent"
    trigger: "telemetry.motor_temp_C > 80"
    promote_to: p0
    capture_pre_sec: 60   # Long pre: see full heating curve
    capture_post_sec: 10

  # ── P1 High ────────────────────────────────────────────────────────────────
  - id: nav_stuck
    description: "Robot not moving despite nonzero velocity command — navigation failure"
    trigger: "telemetry.nav_stuck"
    promote_to: p1
    capture_pre_sec: 10
    capture_post_sec: 15   # Long post: see recovery or escalation

  - id: battery_low
    description: "Battery 15–25% — returning to dock soon"
    trigger: "telemetry.battery_pct < 25"
    promote_to: p1
    capture_pre_sec: 10
    capture_post_sec: 0

  - id: motor_temp_elevated
    description: "Motor temperature 60–80°C — watch for bearing wear trend"
    trigger: "telemetry.motor_temp_C > 60"
    promote_to: p1
    capture_pre_sec: 30
    capture_post_sec: 5

  - id: high_cpu_temp
    description: "CPU temperature > 70°C — potential thermal throttle"
    trigger: "telemetry.cpu_temp_C > 70"
    promote_to: p1
    capture_pre_sec: 20
    capture_post_sec: 5

  - id: slam_lost
    description: "SLAM localization lost — position estimate invalid"
    trigger: "telemetry.slam_localized == False"
    promote_to: p1
    capture_pre_sec: 30   # See what caused localization loss
    capture_post_sec: 30  # See recovery attempt

  # ── P2 Normal ──────────────────────────────────────────────────────────────
  - id: battery_discharging_fast
    description: "Battery drain rate anomaly (Z-Score triggers handled separately)"
    trigger: "telemetry.battery_drain_rate > 0.5"
    promote_to: p2
    capture_pre_sec: 5
    capture_post_sec: 5

  - id: wifi_poor
    description: "WiFi signal below -75 dBm — upload bandwidth degraded"
    trigger: "telemetry.wifi_rssi < -75"
    promote_to: p2
    capture_pre_sec: 0
    capture_post_sec: 0
