version: "3.9"

# ── Robot Pipeline v4 — Full Local Stack ─────────────────────────────────────
#
# Usage:
#   cp .env.example .env          # fill in your values
#   docker compose up             # starts everything
#   docker compose up robot       # robot agent only (demo mode)
#
# Services:
#   robot        — edge agent (demo mode, uses /tmp, skips real GCS)
#   prometheus   — metrics collection with WAL agent config
#   grafana      — dashboards (opens at http://localhost:3000, admin/admin)
#   alertmanager — alert routing (optional, comment out if not needed)
#
# Database:
#   The robot agent uses SQLite on-disk (no external DB needed locally).
#   For Grafana's "Fleet" panels you need a real Postgres instance.
#   Set GF_DATABASE_URL in .env to connect Grafana to your DB.

services:

  # ── Robot edge agent (demo mode) ──────────────────────────────────────────
  robot:
    build:
      context: .
      dockerfile: robot_agent/Dockerfile
    container_name: robot-agent
    command: ["python", "-m", "robot_agent.main", "--demo"]
    environment:
      - DEMO_MODE=1
      - ROBOT_ID=${ROBOT_ID:-robot-local-001}
      - GCS_BUCKET=${GCS_BUCKET:-robot-pipeline-v4-demo}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/sa-key.json
    volumes:
      - robot_data:/tmp/robot_data
      - ./config:/app/config:ro
      - ~/secrets/robot-sa-key.json:/secrets/sa-key.json:ro
    ports:
      - "9100:9100"   # Prometheus metrics endpoint
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:9100/metrics')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus_rules.yml:/etc/prometheus/prometheus_rules.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      robot:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - ROBOT_ID=${ROBOT_ID:-robot-local-001}

  # ── Alertmanager ───────────────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "9093:9093"
    environment:
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      # Disable CSRF origin checking (required for Cloud Shell reverse proxy)
      - GF_SECURITY_CSRF_ALWAYS_CHECK=false
      - GF_SECURITY_CSRF_TRUSTED_ORIGINS=*
      - GF_SECURITY_COOKIE_SAMESITE=disabled
      - GF_SECURITY_COOKIE_SECURE=false
      # Anonymous admin access (no login needed)
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  robot_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local