# monitoring/alertmanager.yml — Robot Pipeline Alert Routing
#
# Default: logs alerts to stdout (visible in `docker compose logs alertmanager`)
# Production: add slack_configs, email_configs, or pagerduty_configs below.

route:
  receiver: 'default-receiver'
  group_by: ['alertname', 'robot_id']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 3h

  routes:
    # Critical alerts: shorter repeat interval
    - match:
        severity: critical
      receiver: 'critical-receiver'
      repeat_interval: 15m

receivers:
  - name: 'default-receiver'
    # Alerts visible at http://localhost:9093/#/alerts
    # Add integrations below for production:
    # slack_configs:
    #   - api_url: 'https://hooks.slack.com/services/...'
    #     channel: '#robot-alerts'
    #     title: '{{ .GroupLabels.alertname }}'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}'

  - name: 'critical-receiver'
    # Same as default for now — configure PagerDuty/Slack for production
    # pagerduty_configs:
    #   - service_key: '<your-pagerduty-key>'

inhibit_rules:
  # If critical CPU is firing, suppress the warning-level CPU alert
  - source_matchers: [severity="critical"]
    target_matchers: [severity="warning"]
    equal: ['alertname', 'robot_id']
