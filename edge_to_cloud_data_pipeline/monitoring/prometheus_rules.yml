# monitoring/prometheus_rules.yml — Robot Pipeline Alert Rules
# Alerts fire based on the 8 Golden KPIs from the robot agent metrics exporter.
# Each rule maps to a real operational scenario documented in the annotation.

groups:
  - name: robot_system_health
    interval: 15s
    rules:
      # ── CPU ──────────────────────────────────────────────────────────────
      - alert: PipelineCPUStarvation
        expr: robot_cpu_pipeline_pct >= 0.95
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Robot {{ $labels.robot_id }} CPU starvation"
          description: "Pipeline consuming >95% CPU for 5+ minutes. SLAM framerate may be degraded."

      - alert: PipelineCPUCritical
        expr: robot_cpu_pipeline_pct >= 0.99
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Robot {{ $labels.robot_id }} CPU critical"
          description: "Pipeline at 99%+ CPU — autonomous navigation likely impaired."

      # ── Disk ─────────────────────────────────────────────────────────────
      - alert: DiskUsageHigh
        expr: robot_disk_usage_pct > 75
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Robot {{ $labels.robot_id }} disk usage above 75%"
          description: "Local storage at {{ $value }}%. Eviction manager should be freeing space."

      - alert: DiskUsageCritical
        expr: robot_disk_usage_pct > 90
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Robot {{ $labels.robot_id }} disk nearly full ({{ $value }}%)"
          description: "Risk of data loss — new recordings may fail."

      # ── Upload Queue ─────────────────────────────────────────────────────
      - alert: UploadQueueBacklog
        expr: sum by (robot_id) (robot_queue_depth) > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Robot {{ $labels.robot_id }} upload queue backlog ({{ $value }} files)"
          description: "Upload queue growing — check network connectivity or cloud rate limits."

      # ── Bandwidth ────────────────────────────────────────────────────────
      - alert: BandwidthCapExhausted
        expr: robot_token_bucket_level < 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Robot {{ $labels.robot_id }} daily bandwidth cap nearly exhausted"
          description: "Token bucket at {{ $value | humanizePercentage }}. Only P0 uploads allowed."

      # ── Anomalies ────────────────────────────────────────────────────────
      - alert: AnomalyFleetSpike
        expr: sum(rate(robot_anomaly_triggers_total[5m])) * 60 > 10
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Fleet-wide anomaly spike ({{ $value }} events/min)"
          description: "Multiple robots triggering anomalies — possible firmware regression or environmental event."

      - alert: AnomalyDetected
        expr: rate(robot_anomaly_triggers_total[5m]) * 60 > 2
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Robot {{ $labels.robot_id }} anomaly rate elevated"
          description: "Detector {{ $labels.detector }}/{{ $labels.rule_id }} firing >2/min."

      # ── HTTP Errors ──────────────────────────────────────────────────────
      - alert: CloudUploadErrors
        expr: rate(robot_http_errors_total[5m]) * 60 > 5
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Robot {{ $labels.robot_id }} upload errors ({{ $value }}/min)"
          description: "HTTP {{ $labels.status_code }} errors. 4xx=auth issue, 5xx=cloud outage."

      # ── Upload Latency ──────────────────────────────────────────────────
      - alert: UploadLatencyHigh
        expr: histogram_quantile(0.99, rate(robot_upload_latency_seconds_bucket[5m])) > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Robot {{ $labels.robot_id }} upload p99 latency >5min"
          description: "Network degradation or pipeline congestion detected."

      # ── Storage Wear ─────────────────────────────────────────────────────
      - alert: StorageWearHigh
        expr: robot_storage_tbw_total > 50
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Robot {{ $labels.robot_id }} storage TBW >50TB"
          description: "eMMC may be approaching rated write life. Investigate rogue log writers."

  - name: robot_availability
    interval: 30s
    rules:
      # ── Agent Down ───────────────────────────────────────────────────────
      - alert: RobotAgentDown
        expr: up{job="robot_pipeline"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Robot agent {{ $labels.instance }} is down"
          description: "Prometheus cannot scrape the robot metrics endpoint."
