---
# Grafana - GKE Deployment
# Project 303: Enterprise LLM Platform with RAG
#
# Pre-configured with:
#   - Prometheus datasource (auto-provisioned)
#   - LLM RAG Platform dashboard (latency, throughput, safety, costs)
#
# Apply: kubectl apply -f kubernetes/gcp/monitoring/grafana.yaml

# ── Grafana Admin Secret ───────────────────────────────────────────────────────
# Run once before applying:
#   kubectl create secret generic grafana-secrets \
#     --from-literal=admin-password=your-secure-password \
#     -n monitoring
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secrets
  namespace: monitoring
type: Opaque
# stringData:          <-- use kubectl create secret above instead
#   admin-password: ""

---
# ── Grafana Config: Prometheus Datasource (auto-provisioned) ─────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus-ds
        url: http://prometheus-service:9090
        access: proxy
        isDefault: true
        jsonData:
          timeInterval: "15s"
          httpMethod: POST

---
# ── Grafana Dashboard: LLM RAG Platform ──────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-config
  namespace: monitoring
data:
  # Tell Grafana to load dashboards from the /var/lib/grafana/dashboards/ folder
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: llm-rag-platform
        orgId: 1
        folder: "LLM RAG Platform"
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-llm
  namespace: monitoring
data:
  llm-rag-dashboard.json: |
    {
      "title": "LLM RAG Platform - Project 303",
      "uid": "llm-rag-platform",
      "tags": ["llm", "rag", "gemini", "project-303"],
      "timezone": "browser",
      "refresh": "30s",
      "time": {"from": "now-1h", "to": "now"},
      "panels": [
        {
          "id": 1,
          "title": "RAG Request Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [{
            "datasource": {"uid": "prometheus-ds"},
            "expr": "sum(rate(rag_requests_total[5m])) by (status)",
            "legendFormat": "{{status}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {"mode": "palette-classic"}
            }
          }
        },
        {
          "id": 2,
          "title": "RAG End-to-End Latency (p50 / p95 / p99)",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "datasource": {"uid": "prometheus-ds"},
              "expr": "histogram_quantile(0.50, sum(rate(rag_query_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "datasource": {"uid": "prometheus-ds"},
              "expr": "histogram_quantile(0.95, sum(rate(rag_query_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "datasource": {"uid": "prometheus-ds"},
              "expr": "histogram_quantile(0.99, sum(rate(rag_query_duration_seconds_bucket[5m])) by (le))",
              "legendFormat": "p99"
            }
          ],
          "fieldConfig": {"defaults": {"unit": "s"}}
        },
        {
          "id": 3,
          "title": "Documents Indexed (rate)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 8},
          "targets": [{
            "datasource": {"uid": "prometheus-ds"},
            "expr": "rate(rag_documents_indexed_total[5m]) * 60",
            "legendFormat": "docs/min"
          }],
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"value": 0, "color": "green"}]}}}
        },
        {
          "id": 4,
          "title": "Safety Violations",
          "type": "timeseries",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 8},
          "targets": [{
            "datasource": {"uid": "prometheus-ds"},
            "expr": "sum(rate(guardrails_violations_total[5m])) by (violation_type, risk_level)",
            "legendFormat": "{{risk_level}}: {{violation_type}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": {"mode": "palette-classic"},
              "custom": {"lineWidth": 2}
            },
            "overrides": [{
              "matcher": {"id": "byValue", "options": {"reducer": "last", "op": "gte", "value": 1}},
              "properties": [{"id": "color", "value": {"fixedColor": "red", "mode": "fixed"}}]
            }]
          }
        },
        {
          "id": 5,
          "title": "Error Rate",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 8},
          "targets": [{
            "datasource": {"uid": "prometheus-ds"},
            "expr": "sum(rate(rag_requests_total{status='error'}[5m])) / sum(rate(rag_requests_total[5m]))",
            "legendFormat": ""
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"value": 0, "color": "green"},
                  {"value": 0.01, "color": "yellow"},
                  {"value": 0.05, "color": "red"}
                ]
              },
              "color": {"mode": "thresholds"}
            }
          }
        },
        {
          "id": 6,
          "title": "Safety Check Rate",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 8},
          "targets": [{
            "datasource": {"uid": "prometheus-ds"},
            "expr": "rate(guardrails_checks_total[5m]) * 60",
            "legendFormat": ""
          }],
          "fieldConfig": {"defaults": {"unit": "short", "displayName": "checks/min"}}
        },
        {
          "id": 7,
          "title": "Request Latency Heatmap",
          "type": "heatmap",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 12},
          "targets": [{
            "datasource": {"uid": "prometheus-ds"},
            "expr": "sum(rate(rag_request_duration_seconds_bucket[5m])) by (le)",
            "format": "heatmap",
            "legendFormat": "{{le}}"
          }]
        },
        {
          "id": 8,
          "title": "Qdrant Health",
          "type": "stat",
          "gridPos": {"h": 4, "w": 8, "x": 0, "y": 20},
          "targets": [{
            "datasource": {"uid": "prometheus-ds"},
            "expr": "up{job='qdrant'}",
            "legendFormat": "Qdrant"
          }],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                {"type": "value", "options": {"0": {"text": "DOWN", "color": "red"}}},
                {"type": "value", "options": {"1": {"text": "UP", "color": "green"}}}
              ],
              "color": {"mode": "thresholds"},
              "thresholds": {"steps": [{"value": 0, "color": "red"}, {"value": 1, "color": "green"}]}
            }
          }
        },
        {
          "id": 9,
          "title": "RAG API Pod Count",
          "type": "stat",
          "gridPos": {"h": 4, "w": 8, "x": 8, "y": 20},
          "targets": [{
            "datasource": {"uid": "prometheus-ds"},
            "expr": "count(up{job='rag-api'} == 1)",
            "legendFormat": "Healthy Pods"
          }],
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "thresholds"}, "thresholds": {"steps": [{"value": 0, "color": "red"}, {"value": 1, "color": "yellow"}, {"value": 2, "color": "green"}]}}}
        },
        {
          "id": 10,
          "title": "RAG API Memory Usage",
          "type": "timeseries",
          "gridPos": {"h": 4, "w": 8, "x": 16, "y": 20},
          "targets": [{
            "datasource": {"uid": "prometheus-ds"},
            "expr": "container_memory_working_set_bytes{container='rag-api', namespace='llm-inference'} / 1024 / 1024",
            "legendFormat": "{{pod}}"
          }],
          "fieldConfig": {"defaults": {"unit": "MiB"}}
        }
      ],
      "schemaVersion": 39
    }

---
# ── Grafana Persistent Storage ────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: monitoring
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi
  storageClassName: standard-rwo

---
# ── Grafana Deployment ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        runAsUser: 472    # grafana user
        fsGroup: 472

      containers:
      - name: grafana
        image: grafana/grafana:10.4.0

        env:
        - name: GF_AUTH_ANONYMOUS_ENABLED
          value: "false"
        - name: GF_AUTH_ANONYMOUS_ORG_ROLE
          value: "Viewer"
        - name: GF_SECURITY_ADMIN_USER
          value: "admin"
        - name: GF_SECURITY_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: grafana-secrets
              key: admin-password
        - name: GF_SERVER_ROOT_URL
          value: "http://grafana-service:3000"
        - name: GF_FEATURE_TOGGLES_ENABLE
          value: "publicDashboards"
        - name: GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH
          value: "/var/lib/grafana/dashboards/llm-rag-dashboard.json"

        ports:
        - name: http
          containerPort: 3000

        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"

        volumeMounts:
        - name: grafana-storage
          mountPath: /var/lib/grafana
        - name: grafana-datasources
          mountPath: /etc/grafana/provisioning/datasources
        - name: grafana-dashboards-config
          mountPath: /etc/grafana/provisioning/dashboards
        - name: grafana-dashboard-json
          mountPath: /var/lib/grafana/dashboards

        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 30

        readinessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10

      volumes:
      - name: grafana-storage
        persistentVolumeClaim:
          claimName: grafana-pvc
      - name: grafana-datasources
        configMap:
          name: grafana-datasources
      - name: grafana-dashboards-config
        configMap:
          name: grafana-dashboards-config
      - name: grafana-dashboard-json
        configMap:
          name: grafana-dashboard-llm

---
# ── Grafana Service ───────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: monitoring
  labels:
    app: grafana
spec:
  # Use LoadBalancer for easy access, or ClusterIP + port-forward for internal
  type: LoadBalancer
  selector:
    app: grafana
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
