---
# Qdrant Vector Database - GKE Deployment
# Project 303: Enterprise LLM Platform with RAG
# Lightweight CPU-only deployment (no GPU required)
#
# Apply with: kubectl apply -f kubernetes/gcp/qdrant/deployment.yaml
# (After creating GKE cluster with Terraform or gcloud)

apiVersion: v1
kind: Namespace
metadata:
  name: llm-inference
  labels:
    project: project-303-llm-rag

---
# Persistent volume claim for Qdrant data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: qdrant-pvc
  namespace: llm-inference
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard-rwo  # GKE standard storage class

---
# Qdrant Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: llm-inference
  labels:
    app: qdrant
    component: vector-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
        component: vector-db
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "6333"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: qdrant
        image: qdrant/qdrant:v1.9.0
        imagePullPolicy: IfNotPresent

        ports:
        - name: http
          containerPort: 6333
          protocol: TCP
        - name: grpc
          containerPort: 6334
          protocol: TCP

        # Qdrant config via environment variables
        env:
        - name: QDRANT__SERVICE__HTTP_PORT
          value: "6333"
        - name: QDRANT__SERVICE__GRPC_PORT
          value: "6334"
        - name: QDRANT__LOG_LEVEL
          value: "INFO"

        # Lightweight resources - fits on e2-medium (free-tier eligible)
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"

        volumeMounts:
        - name: qdrant-storage
          mountPath: /qdrant/storage

        livenessProbe:
          httpGet:
            path: /healthz
            port: 6333
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5

        readinessProbe:
          httpGet:
            path: /healthz
            port: 6333
          initialDelaySeconds: 10
          periodSeconds: 10

      volumes:
      - name: qdrant-storage
        persistentVolumeClaim:
          claimName: qdrant-pvc

---
# Qdrant Service (ClusterIP - internal access only)
apiVersion: v1
kind: Service
metadata:
  name: qdrant-service
  namespace: llm-inference
  labels:
    app: qdrant
    component: vector-db
spec:
  type: ClusterIP
  selector:
    app: qdrant
  ports:
  - name: http
    port: 6333
    targetPort: 6333
    protocol: TCP
  - name: grpc
    port: 6334
    targetPort: 6334
    protocol: TCP
